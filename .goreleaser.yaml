# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy

builds:
  - main: ./...
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64
      - amd64
    ignore:
      - goos: darwin
        goarch: arm64
        goarm: v8.0
brews:
  - name: slow
    # The GitHub repository that acts as your Homebrew tap
    repository:
      owner: gabresoler
      name: homebrew-tap
      # If you're using a standard GitHub Action or a personal access token (PAT)
      # with repo write access, GoReleaser will use it to push.
      token: "{{ .Env.GITHUB_TOKEN }}"

    # The directory inside your homebrew-tap repo where the formula will live
    directory: Formula

    # Metadata for the formula
    homepage: "https://github.com/gabrielsoler/slow"
    description: "Slow is an app that cares for your mental health as a programmer"
    license: "Apache-2.0"

    # Since it's Mac-only, ensure Homebrew only allows installation on macOS
    caveats: |
      This application is designed specifically to run on macOS systems.

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_ {{- title .Os }}_ {{- if eq .Arch "amd64" }}x86_64 {{-
      else if eq .Arch "386" }}i386 {{- else }}{{ .Arch }}{{ end }} {{- if .Arm
      }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-
    
    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
